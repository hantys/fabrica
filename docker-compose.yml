services:
  app-fabrica:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fabrica
    command: sh -c "rm -f tmp/pids/server.pid && yarn install --ignore-engines && bundle exec rails server -b 0.0.0.0 -p 3000 -e development"
    volumes:
      - .:/app
      - bundle:/usr/local/bundle
      - node_modules:/app/node_modules
      - ${HOME}/.ssh:/root/.ssh:ro
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
    ports:
      - "3000:3000"
    environment:
      # DATABASE_URL: postgresql://fabrica:r8BATLUq21@68.183.151.121:5432/fabrica
      RAILS_ENV: development
      DB_HOST: pg_fabrica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      REDIS_URL: redis://redis_fabrica:6379/0
      SSH_AUTH_SOCK: /run/host-services/ssh-auth.sock
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    stdin_open: true
    tty: true
    depends_on:
      pg_fabrica:
        condition: service_healthy
      redis_fabrica:
        condition: service_started

  redis_fabrica:
    image: redis:7-alpine
    container_name: redis_fabrica
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  pg_fabrica:
    image: postgres:14.7-alpine
    container_name: pg_fabrica
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bundle:
  node_modules:
  redis_data:
  postgres_data:
